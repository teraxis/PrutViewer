name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Prepare static demo
        shell: bash
        run: |
          mkdir -p _site/docs/images _site/tests/pdf
          cp demo.html demo.css demo.js demo-files.js demo-pdf-data.js demo-manifest.json script.js style.css LICENSE _site/
          cp docs/images/F74i7CSqVV.mp4 _site/docs/images/
          cp tests/pdf/* _site/tests/pdf/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
