<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PrutViewer demonstration</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./demo.css">
</head>
<body>
    <main data-demo-role="page">
        <header data-demo-role="header">
            <p data-demo-role="eyebrow">Framework-independent document viewer</p>
            <h1>PrutViewer demonstration</h1>
            <p>This page demonstrates files from the collection described by <a href="./demo-manifest.json">demo-manifest.json</a>.</p>
            <p data-demo-role="status" role="status">Initializing viewer…</p>
        </header>
        <section aria-label="Sample documents">
            <div data-viewer-demo tabindex="0" aria-label="Scrollable document viewer"></div>
        </section>
    </main>
    <script src="./script.js"></script>
    <script src="./demo-files.js"></script>
    <script src="./demo-pdf-data.js"></script>
    <script src="./demo.js"></script>
</body>
</html>
